{% extends 'shop/base.html' %}
{% block title %}Add ledger note | Garden City Fine Cuts{% endblock %}
{% block content %}
<div class="mx-auto max-w-3xl glass-card rounded-3xl p-8">
    <h1 class="font-display text-4xl font-bold text-white">{{ form_title }}</h1>
    <form method="post" enctype="multipart/form-data" class="mt-8 grid gap-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="text-sm uppercase tracking-[0.18em] text-zinc-400">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="mt-1 text-sm text-red-300">{{ field.errors|join:", " }}</p>{% endif %}
            </div>
        {% endfor %}
        <button class="rounded-full bg-amber-500 px-7 py-3 font-display text-sm font-semibold uppercase tracking-[0.2em] text-black">Save</button>
    </form>
</div>
{% endblock %}
