{% extends 'shop/base.html' %}
{% block content %}
<div class="mx-auto max-w-3xl glass-card rounded-3xl p-8">
    <h1 class="font-display text-4xl font-bold text-white">{{ form_title }}</h1>
    <form method="post" class="mt-8 grid gap-4 md:grid-cols-2">
        {% csrf_token %}
        {% for field in form %}
            <div class="{% if field.name == 'description' or field.name == 'notes' %}md:col-span-2{% endif %}">
                <label class="text-sm uppercase tracking-[0.18em] text-zinc-400">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}<p class="mt-1 text-xs text-zinc-500">{{ field.help_text }}</p>{% endif %}
                {% if field.errors %}<p class="mt-1 text-sm text-red-300">{{ field.errors|join:", " }}</p>{% endif %}
            </div>
        {% endfor %}
        <div class="md:col-span-2">
            <button class="rounded-full bg-amber-500 px-7 py-3 font-display text-sm font-semibold uppercase tracking-[0.2em] text-black transition hover:bg-amber-400">Save</button>
        </div>
    </form>
</div>
{% endblock %}
