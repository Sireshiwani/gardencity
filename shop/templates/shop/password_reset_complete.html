{% extends 'shop/base.html' %}
{% block title %}Password Updated | Garden City Fine Cuts{% endblock %}
{% block content %}
<div class="mx-auto max-w-md glass-card rounded-3xl p-8">
    <p class="font-display text-sm uppercase tracking-[0.35em] text-yellow-500">Account Recovery</p>
    <h1 class="mt-3 font-display text-4xl font-bold text-white">Password updated</h1>
    <p class="mt-4 text-gray-300">Your password has been reset successfully. You can now sign in.</p>
    <a href="{% url 'login' %}" class="mt-6 inline-block rounded-full bg-gold px-6 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-black hover:bg-yellow-500">Go to login</a>
</div>
{% endblock %}
