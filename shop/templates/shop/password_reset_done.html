{% extends 'shop/base.html' %}
{% block title %}Reset Link Sent | Garden City Fine Cuts{% endblock %}
{% block content %}
<div class="mx-auto max-w-md glass-card rounded-3xl p-8">
    <p class="font-display text-sm uppercase tracking-[0.35em] text-yellow-500">Account Recovery</p>
    <h1 class="mt-3 font-display text-4xl font-bold text-white">Check your inbox</h1>
    <p class="mt-4 text-gray-300">If an account exists for that email, we have sent a password reset link.</p>
    <a href="{% url 'login' %}" class="mt-6 inline-block rounded-full border border-gold/50 px-6 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-yellow-500 hover:bg-gold/10">Back to login</a>
</div>
{% endblock %}
