{% extends 'shop/base.html' %}
{% block content %}
<div class="mx-auto max-w-xl glass-card rounded-3xl p-8">
    <h1 class="font-display text-4xl font-bold text-white">Confirm Delete</h1>
    <p class="mt-4 text-zinc-300">Are you sure you want to delete <span class="text-white">{{ object }}</span>?</p>
    <form method="post" class="mt-8 flex gap-4">
        {% csrf_token %}
        <button class="rounded-full bg-red-500 px-7 py-3 font-display text-sm font-semibold uppercase tracking-[0.2em] text-white">Delete</button>
        <a href="{% url 'dashboard' %}" class="rounded-full border border-white/10 px-7 py-3 font-display text-sm font-semibold uppercase tracking-[0.2em] text-white">Cancel</a>
    </form>
</div>
{% endblock %}
