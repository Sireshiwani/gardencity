{% extends 'shop/base.html' %}
{% block title %}Staff Login | GardenCity{% endblock %}
{% block content %}
<div class="mx-auto max-w-md glass-card rounded-3xl p-8">
    <p class="font-display text-sm uppercase tracking-[0.35em] text-amber-400">Staff Access</p>
    <h1 class="mt-3 font-display text-4xl font-bold text-white">Secure login for your team.</h1>
    <form method="post" class="mt-8 space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="text-sm uppercase tracking-[0.18em] text-zinc-400">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="mt-1 text-sm text-red-300">{{ field.errors|join:", " }}</p>{% endif %}
            </div>
        {% endfor %}
        <button class="w-full rounded-full bg-amber-500 px-7 py-3 font-display text-sm font-semibold uppercase tracking-[0.2em] text-black transition hover:bg-amber-400">Login</button>
    </form>
</div>
{% endblock %}
