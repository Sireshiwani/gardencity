# Garden City Fine Cuts — DigitalOcean VPS (nginx)
# Replace YOUR_DOMAIN with gardencityfinecuts.co.ke (already set in nginx-finecuts.conf)
#
# Architecture:
#   YOUR_DOMAIN          → Next.js (127.0.0.1:3000) — public marketing + /booking
#   Django paths below   → Gunicorn (127.0.0.1:8000) — staff, API, admin
#
# Install: sudo cp deploy/nginx-finecuts.conf /etc/nginx/sites-available/finecuts
#          sudo ln -sf /etc/nginx/sites-available/finecuts /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream finecuts_next {
    server 127.0.0.1:3000;
}

upstream finecuts_django {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name gardencityfinecuts.co.ke www.gardencityfinecuts.co.ke 165.22.30.29;

    # After: sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN

    client_max_body_size 20M;

    # --- Django (staff, API, static, media) — more specific paths first ---
    # Trailing slash optional (/login and /login/ both hit Django)
    location ~ ^/(api|admin|login|logout|account|book|staff|sales|expenses|payments|loyalty|customers|barber|static|media|password-reset|reset|reports|notifications|salary-advances)(/.*)?$ {
        proxy_pass http://finecuts_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Staff service management (trailing slash — Django)
    location /services/ {
        proxy_pass http://finecuts_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Staff dashboard (Django). Next /dashboard link page is optional; staff use this.
    location /dashboard {
        proxy_pass http://finecuts_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Next.js (marketing site) ---
    location /_next/ {
        proxy_pass http://finecuts_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://finecuts_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
