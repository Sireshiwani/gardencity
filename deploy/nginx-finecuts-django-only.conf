# All traffic → Django (Gunicorn 127.0.0.1:8000). No Next.js on :3000.
# Replace YOUR_IP and YOUR_DOMAIN (e.g. shersh.suw.me).
#
#   sudo cp deploy/nginx-finecuts-django-only.conf /etc/nginx/sites-available/finecuts
#   sudo ln -sf /etc/nginx/sites-available/finecuts /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_IP YOUR_DOMAIN www.YOUR_DOMAIN;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/finecuts/staticfiles/;
    }

    location /media/ {
        alias /var/www/finecuts/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
